# Operational settings. Money rules here are enforced by code; changing them
# mid-tournament requires a DECISIONS.md entry.

bankroll: 200.0          # in user's currency units; update to real figure
unit_pct: 0.015           # flat stake = bankroll * unit_pct
edge_threshold: 0.05      # minimum model-vs-devigged-line edge to flag a bet
kelly_enabled: false      # stays false until CLV > 0 over 50+ settled bets

seed: 20260611            # all simulation randomness derives from this
mc_runs: 20000            # tournament Monte Carlo iterations

dixon_coles_decay: 0.00126   # ~ half-life 18 months; revisit after backtest

goal_engine:
  # Per-match fit weight = exp(-decay * days_before_cutoff) * tier_weight.
  # Tier ratios mirror the Elo K convention below (3 : 2.5 : 2 : 1).
  tier_weights:
    world_cup: 3.0
    continental: 2.5
    qualifier: 2.0
    friendly: 1.0
  training_window_years: 10    # older matches carry <1% decay weight anyway
  elo_anchor:
    pseudo_matches: 10.0       # n0 in w = n_eff / (n_eff + n0): Elo prior worth ~10 matches
    min_effective_matches: 15.0  # teams above this define the Elo->strength regression

props:
  # Shrinkage pseudo-matches for per-team stat rates (corners taken, fouls
  # committed) and referee career card rates:
  #   shrunk = (sum + n0 * sample_mean) / (n + n0)
  team_rate_pseudo_matches: 6.0
  ref_rate_pseudo_matches: 8.0
  # Corners/cards walk-forward fits need at least this many training rows;
  # earlier cutoffs are skipped (in practice: WC18 is training-only — its 59
  # non-ET rows are the first usable slice — and the corners/cards eval
  # sample starts at WC22).
  min_train_rows: 50
  # Sparse binary features (rivalry) are dropped from a fit unless they have
  # at least this many positive training rows — an NB coefficient estimated
  # on 2-3 matches is noise that could blow up a live prediction.
  min_flag_support: 5
  # Gate: calibration slope (logistic regression of the over/under outcome
  # on logit(p) at the canonical line) must land in this range.
  calibration_slope_min: 0.8
  calibration_slope_max: 1.2

backtest:
  market_margin: 0.01          # gate: engine may beat market log-loss by at most this
  # Live sanity gate (model vs de-vigged market on upcoming WC26 fixtures).
  # Catches insanity (team mix-ups, inverted favorites, broken home adv), not
  # honest disagreement — thresholds chosen after inspecting the 2026-06-12
  # snapshot (mean diff 0.074, worst 0.213 on brand-heavy teams); see
  # docs/MODEL.md "Live sanity check".
  sanity_max_abs_diff: 0.25    # per-outcome |model - market| ceiling
  sanity_mean_abs_diff: 0.10   # mean per-outcome diff across all fixtures
  sanity_favorite_prob: 0.55   # market favorites above this must be model-modal too

elo:
  k_world_cup: 60
  k_continental: 50
  k_qualifier: 40
  k_friendly: 20

odds_api:
  monthly_credit_budget: 150   # hard cap, free tier is 500
