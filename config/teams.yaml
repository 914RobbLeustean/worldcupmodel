# Canonical team registry for WC 2026.
# - id: canonical snake_case identifier; the ONLY form allowed across module
#   boundaries (CLAUDE.md invariant).
# - aliases: every spelling seen in any source (kaggle results, FBref, Elo
#   sites, sportsbooks). Resolution is case-insensitive and accent-insensitive.
#   Unknown name => UnknownTeamError with a hint to add an alias here.
# Groups per the Dec 5, 2025 final draw (verified vs Wikipedia + FIFA).

teams:
