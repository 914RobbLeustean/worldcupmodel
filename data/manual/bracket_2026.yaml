# FIFA World Cup 26 knockout bracket — entered once, by hand, from the
# official sources (D009: fixtures.parquet carries only the 72 group matches).
#
# Sources (verified 2026-06-12, see docs/DATA.md):
# - FIFA World Cup 2026 Regulations (May 2025), art. 12.5-12.11:
#   https://digitalhub.fifa.com/m/636f5c9c6f29771f/original/FWC2026_regulations_EN.pdf
#   (pairings + match numbers; Annex C = data/manual/third_place_allocation.csv)
# - Dates/venues: FIFA match schedule via en.wikipedia.org/wiki/2026_FIFA_World_Cup_knockout_stage
#
# Slot grammar:
#   1A / 2A      winner / runner-up of group A
#   third_of     R32 slot taking a third-placed team; the allowed groups are
#                listed and the concrete group comes from
#                third_place_allocation.csv (FIFA Annex C, keyed by the set of
#                eight groups whose thirds qualify)
#   W73 / L101   winner / loser of match 73 / 101
#
# country drives knockout home advantage: a host team playing a knockout
# match in its own country is modelled as home (CLAUDE.md invariant).
